<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parris AI Upskilling Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e5e7eb;
}

header {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px 40px;
    border-bottom: 1px solid #1f2937;
}

.logo {
    height: 40px;
}

h1 {
    font-size: 18px;
    font-weight: 500;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px 20px;
}

.section-title {
    margin-top: 40px;
    margin-bottom: 15px;
    font-size: 15px;
    color: #9ca3af;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
}

.card {
    background: #111827;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

.card:hover {
    border-color: #374151;
}

a {
    color: #60a5fa;
    text-decoration: none;
}

.tabs {
    margin-top: 8px;
}

.tabs button {
    background: none;
    border: none;
    margin-right: 10px;
    cursor: pointer;
    font-size: 12px;
    color: #6b7280;
}

.tabs button.active {
    color: #60a5fa;
}

.tab {
    display: none;
    margin-top: 8px;
}

.tab.active {
    display: block;
}

.learn {
    margin-top: 10px;
    font-size: 12px;
    color: #9ca3af;
}

.complete {
    margin-top: 8px;
    padding: 6px;
    font-size: 11px;
    border: none;
    background: #3b82f6;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.complete.done {
    background: #374151;
}

.bar {
    height: 5px;
    background: #1f2937;
    border-radius: 10px;
    margin-bottom: 20px;
}

.fill {
    height: 5px;
    background: #3b82f6;
    width: 0%;
}
</style>
</head>

<body>

<header>
    <img src="parris_logo.png" class="logo">
    <h1>AI Upskilling Hub</h1>
</header>

<div class="container">

<div class="bar"><div id="progress" class="fill"></div></div>

<h2 class="section-title">COURSES</h2>
<div class="grid" id="courses"></div>

<h2 class="section-title">GUIDES</h2>
<div class="grid" id="guides"></div>

</div>

<script>

// COURSES
const courses = [
  {
    title: "AI Foundations",
    link: "https://app.therundown.ai/courses/ai-foundations-course/part/ai-foundations-course-03-part-3?t=620",
    learn: "Learn prompting fundamentals and practical AI usage."
  },
  {
    title: "AI Workflow Automation Foundations",
    link: "https://app.therundown.ai/courses/ai-automations-course/part/ai-automations-course-03-part-3?t=1110",
    learn: "Build automated workflows using AI."
  }
];

// GUIDES
const guides = [
  {
    title: "Audit Claude’s Context",
    link: "https://app.therundown.ai/guides/audit-claudes-context-of-you-and-your-work-in-15-minutes",
    pdf: "context-audit.pdf",
    learn: "Audit and improve AI understanding of your work."
  },
  {
    title: "Weekly Marketing Review",
    link: "https://app.therundown.ai/guides/build-a-weekly-marketing-report-that-runs-itself-in-claude-cowork",
    pdf: "weekly-marketing.pdf",
    learn: "Automate reporting workflows."
  },
  {
    title: "Command Center",
    link: "https://app.therundown.ai/guides/build-a-daily-command-center-with-claude-live-artifacts",
    pdf: "command-center.pdf",
    learn: "Build a live AI dashboard."
  },
  {
    title: "Skill Audit",
    link: "https://app.therundown.ai/guides/turn-claude-sessions-into-skills",
    pdf: "skill-audit.pdf",
    learn: "Turn workflows into reusable skills."
  },
  {
    title: "AI Secretary",
    link: "https://app.therundown.ai/guides/build-an-ai-secretary-that-finds-open-action-items-and-plans-your-day-works-with-slack-gmail-calendar",
    pdf: "ai-secretary.pdf",
    learn: "Automate daily task prioritization."
  },
  {
    title: "AI Editing System",
    link: "https://app.therundown.ai/guides/teach-your-ai-to-edit-like-you-codex-claude-code-system",
    pdf: "ai-editing.pdf",
    learn: "Train AI to match your writing style."
  }
];

// RENDER COURSES
courses.forEach(c => {
    document.getElementById("courses").innerHTML += `
        <div class="card">
            <h<div class="learn">${c.learn}</div>
        </div>
    `;
});

// RENDER GUIDES
guides.forEach((g,i) => {
    const done = localStorage.getItem(g.title);

    document.getElementById("guides").innerHTML += `
        <div class="card">

            <h3>${g.title}</h3>

            <div class="tabs">
                <button onclick="tab(event,'g${i}')" class="active">Guide</button>
                <button onclick="tab(event,'p${i}')">Resource</button>
            </div>

            <div id="g${i}" class="tab active">
                ${g.link}Open guide →</a>
            </div>

            <div id="p${i}" class="tab">
                <a href="${n PDF →</a>
            </div>

            <div class="learn">${g.learn}</div>

            <button class="complete ${done?'done':''}"
                onclick="toggle('${g.title}')">
                ${done?'Completed':'Mark Complete'}
            </button>

        </div>
    `;
});

function tab(e,id){
    const card = e.target.closest(".card");

    card.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    card.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

    card.querySelector("#"+id).classList.add("active");
    e.target.classList.add("active");
}

function toggle(title){
    if(localStorage.getItem(title)){
        localStorage.removeItem(title);
    } else {
        localStorage.setItem(title,true);
    }
    location.reload();
}

function progress(){
    let done = guides.filter(g=>localStorage.getItem(g.title)).length;
    document.getElementById("progress").style.width =
        (done/guides.length)*100 + "%";
}

progress();

</script>

</body>
</html>
